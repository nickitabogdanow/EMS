<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fce7f3"/>
      <stop offset="45%" style="stop-color:#e9d5ff"/>
      <stop offset="100%" style="stop-color:#ddd6fe"/>
    </linearGradient>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="20%" style="stop-color:#fb7185"/>
      <stop offset="35%" style="stop-color:#fbbf24"/>
      <stop offset="50%" style="stop-color:#4ade80"/>
      <stop offset="65%" style="stop-color:#38bdf8"/>
      <stop offset="80%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#sky)"/>

  <!-- clouds -->
  <g fill="#fff" opacity="0.85" filter="url(#soft)">
    <ellipse cx="180" cy="120" rx="90" ry="45"/>
    <ellipse cx="250" cy="115" rx="70" ry="38"/>
    <ellipse cx="900" cy="90" rx="100" ry="48"/>
    <ellipse cx="980" cy="85" rx="75" ry="40"/>
    <ellipse cx="520" cy="680" rx="85" ry="42"/>
    <ellipse cx="590" cy="675" rx="65" ry="35"/>
  </g>

  <!-- rainbow arcs -->
  <g fill="none" stroke-linecap="round" opacity="0.92">
    <path d="M 80 520 A 520 520 0 0 1 1120 520" stroke="url(#rainbow)" stroke-width="28"/>
    <path d="M 130 520 A 470 470 0 0 1 1070 520" stroke="#f9a8d4" stroke-width="18" opacity="0.9"/>
    <path d="M 170 520 A 430 430 0 0 1 1030 520" stroke="#fde68a" stroke-width="14" opacity="0.85"/>
    <path d="M 205 520 A 395 395 0 0 1 995 520" stroke="#86efac" stroke-width="12" opacity="0.85"/>
    <path d="M 235 520 A 365 365 0 0 1 965 520" stroke="#7dd3fc" stroke-width="10" opacity="0.85"/>
    <path d="M 260 520 A 340 340 0 0 1 940 520" stroke="#a5b4fc" stroke-width="8" opacity="0.8"/>
  </g>

  <!-- stars -->
  <g fill="#fff" opacity="0.9">
    <path d="M100 200l4 10 10 4-10 4-4 10-4-10-10-4 10-4z"/>
    <path d="M1050 250l3 8 8 3-8 3-3 8-3-8-8-3 8-3z"/>
    <path d="M320 80l3 7 7 3-7 3-3 7-3-7-7-3 7-3z"/>
    <path d="M750 140l5 12 12 5-12 5-5 12-5-12-12-5 12-5z"/>
    <path d="M450 620l3 8 8 3-8 3-3 8-3-8-8-3 8-3z"/>
  </g>

  <!-- unicorn left (silhouette) -->
  <g transform="translate(120,380) scale(1.15)" fill="#fff" stroke="#c4b5fd" stroke-width="2" opacity="0.95">
    <ellipse cx="85" cy="95" rx="38" ry="28"/>
    <path d="M 45 100 Q 20 130 35 165 Q 50 175 70 170 L 95 155 Q 100 140 92 125 Z"/>
    <ellipse cx="115" cy="135" rx="22" ry="14" transform="rotate(-15 115 135)"/>
    <path d="M 75 75 L 88 35 L 95 72 Z"/>
    <circle cx="102" cy="88" r="4" fill="#8b5cf6"/>
    <path d="M 130 120 Q 165 100 175 130 Q 170 145 145 140 Q 135 130 130 120" fill="#faf5ff"/>
  </g>

  <!-- unicorn right (mirrored) -->
  <g transform="translate(1020,395) scale(-1.12,1.12) translate(-110,-95)" fill="#fff" stroke="#f0abfc" stroke-width="2" opacity="0.95">
    <ellipse cx="85" cy="95" rx="38" ry="28"/>
    <path d="M 45 100 Q 20 130 35 165 Q 50 175 70 170 L 95 155 Q 100 140 92 125 Z"/>
    <ellipse cx="115" cy="135" rx="22" ry="14" transform="rotate(-15 115 135)"/>
    <path d="M 75 75 L 88 35 L 95 72 Z"/>
    <circle cx="102" cy="88" r="4" fill="#ec4899"/>
    <path d="M 130 120 Q 165 100 175 130 Q 170 145 145 140 Q 135 130 130 120" fill="#fdf4ff"/>
  </g>

  <!-- small unicorn distant -->
  <g transform="translate(480,320) scale(0.55)" fill="#fff" stroke="#a78bfa" stroke-width="2.5" opacity="0.88">
    <ellipse cx="85" cy="95" rx="38" ry="28"/>
    <path d="M 45 100 Q 25 125 40 155 Q 55 168 75 162 L 92 148 Q 98 130 88 118 Z"/>
    <path d="M 78 78 L 90 42 L 96 76 Z"/>
    <path d="M 125 118 Q 148 98 158 122 Q 152 138 132 132 Z" fill="#faf5ff"/>
  </g>
</svg>
